<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SMatrix // Spinzi Matrix Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div id="app-container">
        <aside id="sidebar">
            <h1 class="logo">SMatrix</h1>

            <section class="container">
                <h3>Dimensions</h3>
                <div class="input-row">
                    <input type="number" id="grid-w" value="10" min="2" max="50">
                    <span>x</span>
                    <input type="number" id="grid-h" value="10" min="2" max="50">
                </div>
                <button id="btn-generate" class="btn-primary">Generate New Grid</button>
            </section>

            <section class="container">
                <div>
                    <h3>Cell Inspector <small id="coords">(0,0)</small></h3>
                    <div class="input-row">
                        <label>Value</label>
                        <input type="number" id="edit-val" value="0">
                    </div>
                </div>
            </section>

            <section class="container">
                <button id="btn-export">Export JSON</button>
                <input type="file" id="import-file" accept=".json">
                <button id="btn-import">Import JSON</button>
            </section>
        </aside>

        <main id="stage">
            <div id="matrix-wrapper">
                
            </div>
        </main>
    </div>
</body>
</html>
